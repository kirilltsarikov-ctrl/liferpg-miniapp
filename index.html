0px}.trust{display:flex;gap:12px;align-items:flex-start;color:var(--muted);font-size:13px;line-height:1.4;margin-top:18px}.trust span{font-size:17px}.progress{display:flex;gap:6px;margin:4px 0 26px}.progress i{height:5px;flex:1;background:rgba(255,255,255,.11);border-radius:999px}.progress i.on{background:var(--violet)}.step-title{font-size:29px;line-height:1.05;letter-spacing:-.05em;margin:8px 0 12px}.field{display:block;margin:20px 0}.field span{font-size:13px;font-weight:800;display:block;margin:0 0 8px}.field small{display:block;color:var(--muted);font-size:12px;margin-top:7px;line-height:1.35}textarea,input{width:100%;border:1px solid var(--line);color:var(--text);background:rgba(255,255,255,.05);border-radius:16px;font:inherit;padding:15px;outline:none}textarea:focus,input:focus{border-color:var(--violet);box-shadow:0 0 0 3px rgba(142,125,255,.18)}textarea{min-height:118px;resize:vertical}.chips{display:flex;flex-wrap:wrap;gap:8px}.chip{border:1px solid var(--line);background:rgba(255,255,255,.045);color:var(--text);border-radius:999px;padding:10px 13px;font:inherit;font-size:13px;cursor:pointer}.chip[aria-pressed="true"]{background:rgba(142,125,255,.2);border-color:var(--violet);color:#ddd9ff}.choice-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.choice{padding:15px;border:1px solid var(--line);border-radius:17px;background:rgba(255,255,255,.035);color:var(--text);text-align:left;cursor:pointer}.choice strong{display:block;font-size:14px}.choice small{display:block;color:var(--muted);font-size:12px;margin-top:6px;line-height:1.3}.choice[aria-pressed="true"]{border-color:var(--mint);background:rgba(97,223,189,.1)}.section-label{font-weight:800;font-size:14px;margin:24px 0 10px}.nav{height:calc(72px + env(safe-area-inset-bottom));position:fixed;bottom:0;left:50%;transform:translateX(-50%);max-width:760px;width:100%;background:rgba(14,16,31,.92);backdrop-filter:blur(18px);border-top:1px solid var(--line);display:flex;z-index:5;padding-bottom:env x}.quest em{font-style:normal;font-size:12px;color:var(--mint);font-weight:800}.why{margin-top:10px;border-left:2px solid var(--violet);padding:4px 0 4px 10px;color:#c7c2e8;font-size:12px;line-height:1.4}.meter{height:8px;background:rgba(255,255,255,.11);border-radius:999px;overflow:hidden;margin-top:9px}.meter i{display:block;height:100%;background:linear-gradient(90deg,var(--mint),#9de7d3);border-radius:999px}.reflection{background:linear-gradient(145deg,#1d3938,#132725)}.map-summary{display:grid;gap:9px;margin-top:16px}.map-row{display:flex;justify-content:space-between;gap:10px;padding:12px 0;border-bottom:1px solid var(--line);font-size:14px}.map-row:last-child{border-bottom:0}.map-row span{color:var(--muted);text-align:right}.story-card{background:linear-gradient(145deg,#292040,#17182c)}.hero-portrait{width:100%;aspect-ratio:1/1;border-radius:22px;object-fit:cover;display:block;border:1px solid rgba(255,255,255,.14)}.profile-title{font-size:25px;margin:15px 0 4px;letter-spacing:-.05em}.notice{padding:13px 14px;background:rgba(255,189,138,.1);border:1px solid rgba(255,189,138,.22);border-radius:14px;color:#ffd6bb;font-size:13px;line-height:1.4}.empty{color:var(--muted);font-size:14px;line-height:1.45;padding:24px 0}.modal{position:fixed;inset:0;background:rgba(3,4,10,.72);backdrop-filter:blur(8px);z-index:15;display:none;align-items:flex-end}.modal.open{display:flex}.sheet{width:min(760px,100%);margin:auto;background:#171a2e;border-radius:28px 28px 0 0;padding:22px 20px calc(24px + env(safe-area-inset-bottom));box-shadow:0 -20px 60px rgba(0,0,0,.4)}.sheet h2{margin:0;font-size:24px;letter-spacing:-.05em}.sheet p{color:var(--muted);line-height:1.45;font-size:14px}.sheet .primary{margin-top:12px}.hidden{display:none!important}@media (min-width:620px){.screen{padding-left:34px;padding-right:34px}.campaign-art{margin-left:-34px;margin-right:-34px}.status-strip{max-width:500px}.card{padding:20px}}

  const areas=[['health','Здоровье','💪'],['career','Карьера','💼'],['money','Финансы','💰'],['relations','Отношения','❤️'],['growth','Развитие','🧠'],['home','Быт и опора','🏠']];
  const defaults={view:'landing',intakeStep:0,profile:{name:'',story:'',chapter:'',areas:[],time:'15–30 минут',energy:'неровная',obstacles:[],gender:'female'},campaign:null,completed:[],reflection:null};
  let state=load();
  const $=s=>document.querySelector(s);
  const save=()=>localStorage.setItem(STORAGE,JSON.stringify(state));
  function load(){try{return {...defaults,...JSON.parse(localStorage.getItem(STORAGE)||'{}')}}catch{return structuredClone(defaults)}}
  function esc(v=''){return String(v).replace(/[&<>"]+/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]||c))}
  function tgName(){return window.Telegram?.WebApp?.initDataUnsafe?.user?.first_name||''}
  async function syncServerCampaign(){
    if(!API_BASE)return;
    try{
      const initData=window.Telegram?.WebApp?.initData||'';
      if(!apiToken&&initData){
        const auth=await fetch(`${API_BASE}/auth/telegram`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({initData})});
        if(!auth.ok)throw new Error('auth');
        const authData=await auth.json(); apiToken=authData.token||'';
      }
      if(!apiToken)return;
      const p=state.profile;
      const minutes=p.time.includes('60')?60:p.time.includes('30')?20:10;
      const response=await fetch(`${API_BASE}/campaign/generate`,{method:'POST',headers:{'Content-Type':'application/json',Authorization:`Bearer ${apiToken}`},body:JSON.stringify({narrative:p.story,goal:p.chapter,area:pickArea(),constraints:p.obstacles,minutesPerDay:minutes,energy:p.energy})});
      if(!response.ok)throw new Error('campaign');
      const data=await response.json();
      if(!Array.isArray(data.quests)||!data.quests.length)return;
      state.campaign={...state.campaign,...(data.campaign||{}),plan:data.quests.map((q,i)=>({id:`server-${i}`,title:q.title,meta:`AI-квест · ${q.xpReward||10} XP`,why:q.why,details:q.details}))};
      save(); render();
    }catch(error){console.warn('[LifeRPG] серверная персонализация недоступна, использую локальный план',error.message)}
  }
  function titleFor(area){return {health:'Вернуть телу энергию',career:'Усилить профессиональную опору',money:'Навести порядок в деньгах',relations:'Сделать близость живой',growth:'Собрать фокус и рост',home:'Создать устойчивую опору'}[area]||'Пройти важную главу'}
  function pickArea(){return state.profile.areas[0]||'growth'}
  function descriptionFor(area){return {health:'не героический рывок, а действие, которое реально поместится в твой день',career:'маленький шаг, который укрепляет твою профессиональную траекторию',money:'одно ясное действие вместо тревоги и бесконечного откладывания',relations:'живой контакт, который делает отношения теплее',growth:'сфокусированная практика, а не ещё один список непрочитанного',home:'простой ритуал, который возвращает ощущение опоры'}[area]}
  function buildCampaign(){
    const area=pickArea(), goal=(state.profile.chapter||'сделать следующий важный шаг').trim(), low=state.profile.energy==='низкая';
    const mins=state.profile.time.includes('60')?'30 минут':state.profile.time.includes('30')?'15 минут':'7 минут';
    const obstacle=state.profile.obstacles[0]||'нехватку ресурса';
    const plan=[
      {id:'start',title:`${mins}: первый ход к «${goal}»`,meta:`${areas.find(a=>a[0]===area)?.[2]||'✨'} ${areas.find(a=>a[0]===area)?.[1]||'Твоя глава'} · сегодня`,why:`Ты написал(а), что ${esc(state.profile.story||'сейчас нужна перемена')}. Поэтому начинаем с действия, которое не требует идеальных условий.`},
      {id:'clear',title:low?'Убрать одно препятствие перед следующим шагом':'Подготовить среду для завтрашнего действия',meta:'⚡ лёгкая сложность · 10 минут',why:`План учитывает ${obstacle}. Сначала уменьшаем трение, а не требуем силы воли.`},
      {id:'reflect',title:'Вечером: короткая отметка «что сработало»',meta:'📓 рефлексия · 2 минуты',why:'Это даёт кампании данные: следующий день будет подстроен под реальность, а не под идеальный план.'}
    ];
    state.campaign={title:titleFor(area),area,goal,chapter:1,level:1,xp:0,streak:0,createdAt:Date.now(),plan}; save();
  }
  function shell(content,nav=true){return `${content}${nav?`<nav class="nav" aria-label="Главная навигация"><button data-nav="today" aria-current="${state.view==='today'?'page':'false'}"><b>⚔</b>Сегодня</button><button data-nav="campaign" aria-current="${state.view==='campaign'?'page':'false'}"><b>🗺</b>Кампания</button><button data-nav="hero" aria-current="${state.view==='hero'?'page':'false'}"><b>◈</b>Герой</button><button data-nav="journal" aria-current="${state.view==='journal'?'page':'false'}"><b>✦</b>Дневник</button></nav>`:''}`}
  function top(){return `<div class="topbar"><div class="wordmark"><span class="mark">✦</span>LifeRPG</div>${state.campaign?'<button class="icon-btn" data-action="reflection" aria-label="Открыть рефлексию">☾</button>':'<span></span>'}</div>`}
  function landing(){return shell(`<section class="screen active">${top()}<div class="eyebrow">Твоя жизнь — не список задач</div><h1 class="hero-title">Пройди её<br>как кампанию.</h1><p class="subtitle">Опиши, где ты сейчас. LifeRPG соберёт твою историю в маршрут: главную цель, реальные препятствия и задания на сегодня.</p><div class="campaign-art"><span class="art-chip">✦ Кампания строится вокруг твоей жизни</span></div><button class="primary" data-action="start">Создать свою кампанию</button><div class="trust"><span>🔒</span><div>Личные ответы остаются на устройстве, пока ты не подключишь синхронизацию. Никаких публичных рейтингов твоей жизни.</div></div></section>`,false)}
  function intake(){const p=state.profile,step=state.intakeStep; let body='';
    if(step===0) body=`<div class="eyebrow">Карта жизни · 1 из 3</div><h1 class="step-title">Где ты<br>сейчас?</h1><p class="subtitle">Не нужно красиво. Напиши как есть: что происходит, что давит, чего не хватает и что уже получается.</p><label class="field"><span>Текущая реальность</span><textarea id="story" placeholder="Например: работаю много, хочется вернуть энергию и развить своё дело, но после вечера сил почти не остаётся">${esc(p.story)}</textarea><small>Это станет контекстом для твоих заданий — не публикуется и не оценивается.</small></label><label class="field"><span>Как назвать героя кампании?</span><input id="name" maxlength="40" placeholder="Твоё имя" value="${esc(p.name||tgName())}"></label>`;
    if(step===1) body=`<div class="eyebrow">Карта жизни · 2 из 3</div><h1 class="step-title">Какую главу<br>ты хочешь пройти?</h1><p class="subtitle">Выбери 1–3 сферы. Кампания не пытается починить всю жизнь за неделю.</p><div class="chips" id="areas">${areas.map(([id,label,icon])=>`<button class="chip" data-area="${id}" aria-pressed="${p.areas.includes(id)}">${icon} ${label}</button>`).join('')}</div><label class="field"><span>Какой результат будет для тебя настоящей победой?</span><textarea id="chapter" placeholder="Например: за 3 месяца вернуться к регулярным тренировкам и пробежать первые 5 км">${esc(p.chapter)}</textarea></label>`;
    if(step===2) body=`<div class="eyebrow">Карта жизни · 3 из 3</div><h1 class="step-title">Подстроим игру<br>под твою реальность.</h1><p class="subtitle">Это не экзамен. Эти настройки помогают не выдавать задания, которые невозможно выполнить.</p><div class="section-label">Сколько времени правда есть в обычный день?</div><div class="choice-grid" id="time">${['5–10 минут','15–30 минут','60+ минут','по-разному'].map(v=>`<button class="choice" data-time="${v}" aria-pressed="${p.time===v}"><strong>${v}</strong><small>${v==='5–10 минут'?'микро-действия':'подстроим темп'}</small></button>`).join('')}</div><div class="section-label">Как сейчас с энергией?</div><div class="choice-grid" id="energy">${[['низкая','Нужно беречь ресурс'],['неровная','День на день не приходится'],['хорошая','Можно брать темп']].map(([v,d])=>`<button class="choice" data-energy="${v}" aria-pressed="${p.energy===v}"><strong>${v}</strong><small>${d}</small></button>`).join('')}</div><div class="section-label">Что чаще всего сбивает?</div><div class="chips" id="obstacles">${['нехватка времени','тревога','прокрастинация','усталость','деньги','нет поддержки'].map(v=>`<button class="chip" data-obstacle="${v}" aria-pressed="${p.obstacles.includes(v)}">${v}</button>`).join('')}</div>`;
    return shell(`<section class="screen active">${top()}<div class="progress"><i class="${step>=0?'on':''}"></i><i class="${step>=1?'on':''}"></i><i class="${step>=2?'on':''}"></i></div>${body}<button class="primary" data-action="intake-next">${step===2?'Собрать мою кампанию':'Продолжить'}</button>${step?' <button class="ghost" data-action="intake-back">Назад</button>':''}</section>`,false)}
  function today(){const c=state.campaign;if(!c)return landing();const done=state.completed.length,progress=Math.min(100,Math.round((c.xp%100)));return shell(`<section class="screen active">${top()}<div class="dashboard-head"><div class="eyebrow">Глава ${c.chapter} · ${areas.find(a=>a[0]===c.area)?.[1]||'Жизнь'}</div><h1>Твой ход,<br>${esc(state.profile.name||'герой')}.</h1><p class="subtitle">Не нужно выиграть день. Достаточно сделать следующий осмысленный ход.</p></div><div class="status-strip"><div class="status"><b>Ур. ${c.level}</b><span>статус кампании</span></div><div class="status"><b>${c.streak} 🔥</b><span>серия действий</span></div><div class="status"><b>${done}/${c.plan.length}</b><span>ходов сегодня</span></div></div><div class="card campaign-card"><span class="badge">🗺 Главная линия</span><h2>${esc(c.goal)}</h2><p>${esc(descriptionFor(c.area))}. Эта неделя — про устойчивый ритм, не про рывок.</p><div class="meter"><i style="width:${progress}%"></i></div><p style="font-size:12px">${c.xp}/100 опыта до следующего статуса</p></div><div class="card"><h2>Сегодняшние ходы</h2>${c.plan.map(q=>`<div class="quest"><button class="check ${state.completed.includes(q.id)?'done':''}" data-quest="${q.id}" aria-label="${state.completed.includes(q.id)?'Отметить невыполненным':'Отметить выполненным'}">✓</button><div><strong>${esc(q.title)}</strong><small>${esc(q.meta)}</small></div><em>+${q.id==='start'?35:20} XP</em></div><div class="why">Почему это сейчас: ${q.why}</div>`).join('')}</div><div class="card reflection"><h3>После выполнения</h3><p>Скажи приложению, как это прошло. Следующий ход станет легче или смелее — по твоему факту, а не по шаблону.</p><button class="secondary" data-action="reflection">Отметить состояние дня</button></div></section>`)}
  function campaign(){const c=state.campaign;if(!c)return landing();return shell(`<section class="screen active">${top()}<div class="eyebrow">Твоя кампания</div><h1 class="step-title">${esc(c.title)}</h1><p class="subtitle">Маршрут создан из твоей ситуации, доступного времени и того, что для тебя действительно важно.</p><div class="card story-card"><span class="badge">Глава ${c.chapter} · активна</span><h2 style="margin-top:12px">${esc(c.goal)}</h2><p>Твоя история: ${esc(state.profile.story||'ещё не описана')}</p></div><div class="card"><h2>Правила твоей кампании</h2><div class="map-summary"><div class="map-row"><b>Ритм</b><span>${esc(state.profile.time)}</span></div><div class="map-row"><b>Энергия</b><span>${esc(state.profile.energy)}</span></div><div class="map-row"><b>Главное препятствие</b><span>${esc(state.profile.obstacles.join(', ')||'уточняется')}</span></div><div class="map-row"><b>Как адаптируется план</b><span>по отметкам и рефлексии</span></div></div></div><div class="notice">Реальный статус растёт за сделанные шаги. Награды здесь — способ видеть прогресс, а не подмена самой жизни.</div></section>`)}
  function hero(){const p=state.profile;return shell(`<section class="screen active">${top()}<div class="eyebrow">Твой персонаж</div><h1 class="step-title">${esc(p.name||'Герой кампании')}</h1><p class="subtitle">Образ не определяет тебя — он просто напоминает: это твоя история, и ты управляешь следующим ходом.</p><div class="card"><img class="hero-portrait" src="${ASSET_URLS[p.gender==='male'?'male':'female']}" alt="Портрет персонажа"><h2 class="profile-title">${p.gender==='male'?'Герой':'Героиня'} кампании</h2><p>Текущий статус: <b>${state.campaign?'Первые шаги':'Карта ещё не создана'}</b></p></div><div class="section-label">Образ персонажа</div><div class="choice-grid"><button class="choice" data-gender="female" aria-pressed="${p.gender==='female'}"><strong>🧙‍♀️ Героиня</strong><small>Выбрать образ</small></button><button class="choice" data-gender="male" aria-pressed="${p.gender==='male'}"><strong>🧙‍♂️ Герой</strong><small>Выбрать образ</small></button></div><button class="secondary" data-action="restart">Пересобрать карту жизни</button></section>`)}
  function journal(){const c=state.campaign;return shell(`<section class="screen active">${top()}<div class="eyebrow">Летопись</div><h1 class="step-title">Факты твоего<br>прогресса.</h1>${c?`<div class="card"><h2>Что уже сделано</h2>${state.completed.length?state.completed.map(id=>`<div class="map-row"><b>✓ ${esc(c.plan.find(q=>q.id===id)?.title||'Ход')}</b><span>сегодня</span></div>`).join(''):'<p class="empty">Твоя летопись начнётся с первого выполненного действия. Маленькие победы здесь не исчезают.</p>'}</div><div class="card"><h2>Еженедельная проверка</h2><p>Раз в неделю ты отвечаешь, что стало легче, что оказалось лишним и что поменялось в жизни. Кампания пересобирает следующую главу.</p><button class="secondary" data-action="reflection">Открыть рефлексию</button></div>`:'<p class="empty">Сначала создай свою кампанию — тогда здесь появится история настоящих действий.</p>'}</section>`)}
  function reflection(){return `<div class="sheet"><h2 id="modal-title">Как прошёл сегодня?</h2><p>Одно честное сообщение поможет подобрать завтрашний ритм. Можно коротко.</p><div class="chips" id="mood"><button class="chip" data-mood="тяжело" aria-pressed="false">было тяжело</button><button class="chip" data-mood="нормально" aria-pressed="true">в моём темпе</button><button class="chip" data-mood="легко" aria-pressed="false">можно сложнее</button></div><label class="field"><span>Что помогло или помешало?</span><textarea id="reflection-text" placeholder="Например: смог(ла) только вечером, но без напряжения"></textarea></label><button class="primary" data-action="save-reflection">Сохранить и адаптировать завтра</button><button class="ghost" data-action="close-modal">Не сейчас</button></div>`}
  function render(){let content=state.view==='landing'?landing():state.view==='intake'?intake():state.view==='today'?today():state.view==='campaign'?campaign():state.view==='hero'?hero():journal();$('#app').innerHTML=content; bind();}
  function openModal(){const m=$('#modal');m.innerHTML=reflection();m.classList.add('open');bind();}
  function closeModal(){const m=$('#modal');m.classList.remove('open');m.innerHTML=''}
  function bind(){document.querySelectorAll('[data-nav]').forEach(b=>b.addEventListener('click',()=>{state.view=b.dataset.nav;save();render()}));document.querySelectorAll('[data-action]').forEach(b=>b.addEventListener('click',()=>act(b.dataset.action,b)));document.querySelectorAll('[data-area]').forEach(b=>b.addEventListener('click',()=>{const id=b.dataset.area;const list=state.profile.areas;state.profile.areas=list.includes(id)?list.filter(x=>x!==id):(list.length<3?[...list,id]:list);save();render()}));document.querySelectorAll('[data-time]').forEach(b=>b.addEventListener('click',()=>{state.profile.time=b.dataset.time;save();render()}));document.querySelectorAll('[data-energy]').forEach(b=>b.addEventListener('click',()=>{state.profile.energy=b.dataset.energy;save();render()}));document.querySelectorAll('[data-obstacle]').forEach(b=>b.addEventListener('click',()=>{const v=b.dataset.obstacle;state.profile.obstacles=state.profile.obstacles.includes(v)?state.profile.obstacles.filter(x=>x!==v):[...state.profile.obstacles,v];save();render()}));document.querySelectorAll('[data-gender]').forEach(b=>b.addEventListener('click',()=>{state.profile.gender=b.dataset.gender;save();render()}));document.querySelectorAll('[data-quest]').forEach(b=>b.addEventListener('click',()=>toggleQuest(b.dataset.quest)));document.querySelectorAll('[data-mood]').forEach(b=>b.addEventListener('click',()=>{document.querySelectorAll('[data-mood]').forEach(x=>x.setAttribute('aria-pressed','false'));b.setAttribute('aria-pressed','true')}));}
  function act(action){if(action==='start'){state.view='intake';state.intakeStep=0;save();render()}if(action==='intake-back'){state.intakeStep--;save();render()}if(action==='intake-next'){if(state.intakeStep===0){state.profile.story=$('#story').value.trim();state.profile.name=$('#name').value.trim()||tgName()||'Герой';if(!state.profile.story){$('#story').focus();return}}if(state.intakeStep===1){state.profile.chapter=$('#chapter').value.trim();if(!state.profile.areas.length||!state.profile.chapter){alert('Выбери хотя бы одну сферу и опиши желаемую победу.');return}}if(state.intakeStep<2){state.intakeStep++;save();render()}else{buildCampaign();state.view='today';save();render();syncServerCampaign()}}if(action==='reflection')openModal();if(action==='close-modal')closeModal();if(action==='save-reflection'){const mood=document.querySelector('[data-mood][aria-pressed="true"]')?.dataset.mood||'нормально';state.reflection={mood,text:$('#reflection-text').value.trim(),at:Date.now()};if(state.campaign){if(mood==='легко')state.campaign.xp+=8;if(mood==='тяжело')state.campaign.xp=Math.max(0,state.campaign.xp-2)}save();closeModal();render()}if(action==='restart'){if(confirm('Пересобрать карту жизни? Текущий локальный прогресс будет очищен.')){state=structuredClone(defaults);state.view='intake';save();render()}}}
  function toggleQuest(id){if(!state.campaign)return;const done=state.completed.includes(id);state.completed=done?state.completed.filter(x=>x!==id):[...state.completed,id];state.campaign.xp=Math.max(0,state.campaign.xp+(done?-20:20));state.campaign.level=1+Math.floor(state.campaign.xp/100);state.campaign.streak=state.completed.length?1:0;save();render()}
  render();
})();
</script>
</body>
</html>
