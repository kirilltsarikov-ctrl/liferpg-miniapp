ght:1.4;margin-top:6px}.field{display:block;margin:19px 0}.field span{display:block;font-size:13px;font-weight:800;margin-bottom:8px}input,textarea{width:100%;padding:14px;color:#fff;background:#fff0;border:1px solid var(--line);border-radius:14px}textarea{min-height:110px;resize:vertical}.nav{height:70px;position:fixed;z-index:3;bottom:0;left:50%;transform:translateX(-50%);width:min(780px,100%);display:flex;background:#111426ed;border-top:1px solid var(--line)}.nav button{flex:1;border:0;background:0;color:var(--muted);font-size:11px}.nav b{display:block;font-size:20px}.nav .on{color:var(--violet)}.log{border-left:2px solid var(--violet);padding:8px 0 8px 12px;color:#d9d5f3;font-size:13px;line-height:1.45}@media(min-width:620px){.app{padding-left:34px;padding-right:34px}}
</style></head>
<body><main class="app" id="app"></main>
<script>
(()=>{
const K='liferpg-saga-v2';
const API='https://liferpg-miniapp.onrender.com';
let aiToken='';
const zones=[['body','Тело','⚔'],['work','Дело','✦'],['bond','Связи','♡'],['base','Опора','⌂']];
const base={view:'landing',step:0,profile:{name:'',story:'',goal:'',boss:'',zone:'body'},game:null,log:[]};
let s=load();const app=document.querySelector('#app');const esc=v=>String(v||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));const save=()=>localStorage.setItem(K,JSON.stringify(s));
function load(){try{return {...base,...JSON.parse(localStorage.getItem(K)||'{}')}}catch{return structuredClone(base)}}
async function generateAI(){const init=window.Telegram?.WebApp?.initData||'';if(!init||!s.game)return;const g=s.game;g.ai='loading';g.event='AI собирает следующую сцену из твоей истории и уже сделанных ходов…';save();render();try{if(!aiToken){const auth=await fetch(API+'/auth/telegram',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({initData:init})});if(!auth.ok)throw new Error('auth');aiToken=(await auth.json()).token||''}const r=await fetch(API+'/campaign/generate',{method:'POST',headers:{'Content-Type':'application/json',Authorization:'Bearer '+aiToken},body:JSON.stringify({narrative:s.profile.story,goal:s.profile.goal,area:s.profile.zone,obstacles:[s.profile.boss],minutesPerDay:30,energy:g.stats.energy,chapter:g.chapter,day:g.day,history:s.log.slice(-5).map(x=>x.text)})});if(!r.ok)throw new Error('ai');const data=await r.json();const qs=(data.quests||[]).slice(0,3);if(qs.length<3)throw new Error('empty');g.choices=qs.map((q,i)=>{const xp=Math.max(10,Math.min(50,Number(q.xpReward)||15+i*10));return[String(q.title||'Следующий ход'),String(q.details||q.why||'Сделай конкретный шаг по цели.'),i===0?'низкий риск':i===1?'средний риск':'высокий риск',xp,Math.max(8,Math.round(xp*.8)),i===0?'focus':i===1?'courage':'energy']});g.ai='ready';g.event=`AI подготовил три ветки главы под цель «${s.profile.goal}». Выбери ту, на которую готов пойти сегодня.`;save();render()}catch{g.ai='offline';g.event='Связь с AI недоступна — оставлены базовые ветки, чтобы прохождение не останавливалось.';save();render()}}
function top(){return `<div class="top"><div class="brand"><span class="mark">✦</span>LifeRPG</div><span class="eyebrow">Глава ${s.game?.chapter||0}</span></div>`}
function nav(){return `<nav class="nav"><button class="${s.view==='today'?'on':''}" data-view="today"><b>⚔</b>Ход</button><button class="${s.view==='map'?'on':''}" data-view="map"><b>🗺</b>Карта</button><button class="${s.view==='log'?'on':''}" data-view="log"><b>📜</b>Летопись</button></nav>`}
function shell(x,n=true){return x+(n?nav():'')}
function landing(){return shell(`<section>${top()}<div class="eyebrow">Сага твоей жизни</div><h1 class="h1">Не выполняй задачи.<br>Проходи главы.</h1><p class="sub">Создай героя, назови босса и сделай первый выбор. Каждая глава будет менять карту мира.</p><div class="art"><span>✦ мир реагирует на твои действия</span></div><button class="primary" data-action="start">Начать первую главу</button></section>`,false)}
function intake(){const p=s.profile;let body='';if(s.step===0)body=`<div class="eyebrow">Пролог · 1/3</div><h1 class="h1">Где герой<br>сейчас?</h1><p class="sub">Опиши реальность без красивых формулировок.</p><label class="field"><span>История</span><textarea id="story" placeholder="Работаю до вечера, устал, хочу вернуть контроль...">${esc(p.story)}</textarea></label><label class="field"><span>Имя героя</span><input id="name" value="${esc(p.name)}" placeholder="Как тебя называть?"></label>`;if(s.step===1)body=`<div class="eyebrow">Пролог · 2/3</div><h1 class="h1">Какой финал<br>у первой главы?</h1><p class="sub">Цель на 30–90 дней, которую можно увидеть в реальности.</p><label class="field"><span>Финал главы</span><textarea id="goal" placeholder="Пробежать 5 км без остановки...">${esc(p.goal)}</textarea></label><div class="eyebrow">Территория</div>${zones.map(z=>`<button class="branch" data-zone="${z[0]}" aria-pressed="${p.zone===z[0]}"><strong>${z[2]} ${z[1]}</strong><small>${p.zone===z[0]?'Главная линия':'Откроется позже'}</small></button>`).join('')}`;if(s.step===2)body=`<div class="eyebrow">Пролог · 3/3</div><h1 class="h1">Кто босс<br>этой главы?</h1><p class="sub">Назови то, что каждый раз возвращает тебя назад.</p><label class="field"><span>Главное препятствие</span><input id="boss" placeholder="усталость, тревога, долги, страх отказа"></label>`;return shell(`<section>${top()}${body}<button class="primary" data-action="next">${s.step===2?'Войти в главу':'Продолжить'}</button>${s.step?'<button class="ghost" data-action="back">Назад</button>':''}</section>`,false)}
function initGame(){const p=s.profile;s.game={chapter:1,day:1,boss:p.boss||'инерция',hp:100,xp:0,level:1,scene:'Пролог завершён',event:`Ты вошёл в первую главу. ${p.story}`,stats:{energy:5,focus:5,courage:5},choices:makeChoices(1)};s.log=[{type:'Начало саги',text:`${p.name||'Герой'} начал путь к «${p.goal}». Босс: ${p.boss}.`,at:Date.now()}];save();generateAI()}
function makeChoices(ch){const p=s.profile;return ch===1?[['Разведка','10 минут на карту цели','низкий риск',12,10,'focus'],['Столкновение',`15 минут против «${p.boss}»`,'средний риск',25,22,'courage'],['Решающий рывок',`30 минут по линии «${p.goal}»`,'высокий риск',40,35,'energy']]:[['Трофей главы','Закрепить изменение после победы','низкий риск',20,18,'focus'],['Новая территория','Сделать непривычный шаг','средний риск',35,27,'courage'],['Финальный удар','Решить главный узел главы','высокий риск',50,40,'energy']]}
function map(){const g=s.game;return shell(`<section>${top()}<div class="eyebrow">Карта мира · глава ${g.chapter}</div><h1 class="h1">${esc(s.profile.goal)}</h1><p class="sub">Сцена: ${esc(g.scene)}. Победа над боссом открывает новый акт.</p><div class="card boss"><div class="eyebrow">Босс главы</div><h2>${esc(g.boss)}</h2><p class="sub">${g.hp}/100 HP</p><div class="bar"><i style="width:${g.hp}%"></i></div></div><div class="card"><div class="stats">${[['energy','энергия'],['focus','фокус'],['courage','смелость']].map(x=>`<div class="stat"><b>${g.stats[x[0]]}</b><small>${x[1]}</small></div>`).join('')}<div class="stat"><b>${g.level}</b><small>уровень</small></div></div><p class="sub">День ${g.day} · ${g.xp} XP</p></div><button class="primary" data-view="today">Открыть сцену</button></section>`)}
function today(){const g=s.game;return shell(`<section>${top()}<div class="eyebrow">Глава ${g.chapter} · день ${g.day}</div><h1 class="h1">Какой ход<br>ты выбираешь?</h1><p class="sub">У веток разные риск, награда и последствия для характеристик.</p>${g.choices.map((q,i)=>`<button class="branch" data-choice="${i}"><strong>${q[0]}</strong><small>${q[1]} · ${q[2]} · +${q[3]} XP · -${q[4]} HP боссу</small></button>`).join('')}<div class="card"><div class="eyebrow">Событие сцены</div><div class="log">${esc(g.event)}</div></div></section>`)}
function log(){return shell(`<section>${top()}<div class="eyebrow">Летопись</div><h1 class="h1">Твои решения<br>оставляют след.</h1>${s.log.length?s.log.slice().reverse().map(x=>`<div class="card"><div class="eyebrow">${new Date(x.at).toLocaleDateString('ru-RU')} · ${esc(x.type)}</div><div class="log">${esc(x.text)}</div></div>`).join(''):'<p class="sub">Первый выбор ещё впереди.</p>'}</section>`)}
function choose(i){const g=s.game,q=g.choices[i];g.xp+=q[3];g.hp=Math.max(0,g.hp-q[4]);g.stats[q[5]]=Math.min(10,g.stats[q[5]]+1);g.level=1+Math.floor(g.xp/100);g.day++;g.event=`${q[0]} завершён. Босс получил ${q[4]} урона. Следующая сцена родилась из этого выбора.`;s.log.push({type:'Ветка выбора',text:`${q[0]} · +${q[3]} XP · -${q[4]} HP.`,at:Date.now()});if(g.hp===0){const old=g.chapter;g.chapter++;g.hp=100;g.boss=`Босс главы ${g.chapter}`;g.scene='Новая территория открыта';g.choices=makeChoices(g.chapter);g.event=`Глава ${old} пройдена. Мир открыл новый акт.`;s.log.push({type:'Глава завершена',text:`Побеждён босс «${q[1]}». Началась глава ${g.chapter}.`,at:Date.now()})}else{g.scene=`Последствия ветки «${q[0]}»`;g.choices=makeChoices(g.chapter)}save();s.view='today';render();generateAI()}
function act(a){if(a==='start'){s.step=0;s.view='intake';render()}if(a==='back'){s.step--;render()}if(a==='next'){if(s.step===0){s.profile.story=$('#story').value.trim();s.profile.name=$('#name').value.trim()||'Герой';if(!s.profile.story)return alert('Опиши реальность героя.')}if(s.step===1){s.profile.goal=$('#goal').value.trim();if(!s.profile.goal)return alert('Назови финал главы.')}if(s.step<2){s.step++;render()}else{s.profile.boss=$('#boss').value.trim()||'инерция';initGame();s.view='map';render()}}}
function render(){app.innerHTML=s.view==='landing'?landing():s.view==='intake'?intake():s.view==='map'?map():s.view==='today'?today():log();bind()}
function bind(){document.querySelectorAll('[data-action]').forEach(b=>b.onclick=()=>act(b.dataset.action));document.querySelectorAll('[data-view]').forEach(b=>b.onclick=()=>{s.view=b.dataset.view;save();render()});document.querySelectorAll('[data-zone]').forEach(b=>b.onclick=()=>{s.profile.zone=b.dataset.zone;save();render()});document.querySelectorAll('[data-choice]').forEach(b=>b.onclick=()=>choose(+b.dataset.choice))}render();
})();</script></body></html>
